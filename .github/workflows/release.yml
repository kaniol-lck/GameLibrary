name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            goos: windows
            ext: .exe
          - os: ubuntu-latest
            goos: linux
            ext: ''
          - os: macos-latest
            goos: darwin
            ext: ''
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Set version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build
        shell: bash
        run: |
          export PATH="$HOME/go/bin:$PATH"
          wails build -platform "${{ matrix.goos }}/amd64" -ldflags="-X main.version=$VERSION" -clean

      - name: Prepare assets
        shell: bash
        run: |
          BIN="build/bin/GameLibrary${{ matrix.ext }}"
          ASSET="GameLibrary-${{ matrix.goos }}-amd64${{ matrix.ext }}"
          cp "$BIN" "$ASSET"
          if command -v sha256sum &> /dev/null; then
            sha256sum "$ASSET" > "${ASSET}.sha256"
          else
            shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          fi
          echo "ASSET=$ASSET" >> $GITHUB_ENV

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          name: GameLibrary ${{ github.ref_name }}
          body_path: .github/RELEASE_TEMPLATE.md
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
          generate_release_notes: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
